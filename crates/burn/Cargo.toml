[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
categories = ["science", "no-std", "embedded", "wasm"]
description = "Flexible and Comprehensive Deep Learning Framework in Rust"
documentation = "https://docs.rs/burn"
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "tensor", "pytorch", "ndarray"]
license.workspace = true
name = "burn"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn"
rust-version = "1.92"
version.workspace = true

[lints]
workspace = true

[features]
default = [
    "std",
    "burn-core/default",
    "burn-train?/default",
    "burn-collective?/default",
    "burn-nn/default",
    "burn-optim/default",
]
doc = [
    "default",
    "train",
    "burn-core/doc",
    "burn-train/doc",
    "burn-collective/doc",
    "burn-store?/std",
    "burn-nn/doc",
    "burn-optim/doc",
]
std = [
    "burn-core/std",
    "burn-store?/std",
    "burn-nn/std",
    "burn-optim/std",
]
tracing = [
    "cubecl?/tracing",
    "burn-core/tracing",
    "burn-store?/tracing",
    "burn-vision?/tracing",
    "burn-nn/tracing",
    "burn-optim/tracing",
]


network = ["burn-core/network"]

# Training with full features
train = ["burn-train", "autodiff", "dataset"]

## Includes the Text UI (progress bars, metric plots)
tui = ["burn-train?/tui"]

##  Includes system info metrics (CPU/GPU usage, etc)
metrics = ["burn-train?/sys-metrics"]

# Datasets
dataset = ["burn-core/dataset"]

sqlite = ["burn-core/sqlite"]
sqlite-bundled = ["burn-core/sqlite-bundled"]

# Custom deserializer for Record that is helpful for importing data, such as PyTorch pt files.
record-item-custom-serde = ["burn-core/record-item-custom-serde"]

# Model storage and serialization (SafeTensors, PyTorch interop)
store = ["burn-store"]

# CubeCL re-export
cubecl = ["dep:cubecl"]

audio = ["burn-core/audio"]
vision = ["burn-core/vision", "burn-vision"]
rl = ["dep:burn-rl", "burn-train?/rl"]

# Backend
ir = ["burn-ir"]
autodiff = ["burn-core/autodiff"]
fusion = [
    "ir",
    "burn-core/fusion",
]

## Backend features
accelerate = ["burn-candle?/accelerate", "burn-ndarray?/blas-accelerate"]
autotune = [
    "burn-core/autotune",
]
autotune-checks = [
    "burn-core/autotune-checks",
]
blas-netlib = ["burn-ndarray?/blas-netlib"]
openblas = ["burn-ndarray?/blas-openblas"]
openblas-system = ["burn-ndarray?/blas-openblas-system"]
simd = ["burn-ndarray?/simd"]
template = ["burn-wgpu?/template"]
collective = ["burn-collective", "burn-optim/collective"]
distributed = ["std",
    "burn-core/distributed",
    "burn-optim/distributed",
    "burn-train?/ddp",
]
# TODO: add to burn dispatch
remote = ["burn-remote/client", "ir"]
router = ["burn-router", "ir"]
server = ["burn-remote/server"]

candle = ["burn-candle"]
candle-cuda = ["candle", "burn-candle/cuda"]
candle-metal = ["burn-candle?/metal"]
cuda = ["burn-cuda", "burn-core/cuda"]
rocm = ["burn-rocm", "burn-core/rocm"]
flex = ["burn-flex", "burn-core/flex"]
ndarray = ["burn-ndarray", "burn-core/ndarray"]
tch = ["burn-tch"]
vulkan = ["wgpu", "burn-core/vulkan"]
webgpu = ["wgpu", "burn-core/webgpu"]
metal = ["wgpu", "burn-core/metal"]
wgpu = ["burn-wgpu", "burn-core/wgpu"]
cpu = ["burn-cpu", "burn-core/cpu"]

[dependencies]

# ** Please make sure all dependencies support no_std when std is disabled **

burn-core = { path = "../burn-core", version = "=0.21.0-pre.3", default-features = false }
burn-train = { path = "../burn-train", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-collective = { path = "../burn-collective", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-store = { path = "../burn-store", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-nn = { path = "../burn-nn", version = "=0.21.0-pre.3", default-features = false }
burn-optim = { path = "../burn-optim", version = "=0.21.0-pre.3", default-features = false }
burn-rl = { path = "../burn-rl", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-vision = { path = "../burn-vision", version = "=0.21.0-pre.3", optional = true, default-features = false }

# Backends
burn-candle = { path = "../burn-candle", version = "=0.21.0-pre.3", optional = true }
burn-cuda = { path = "../burn-cuda", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-cpu = { path = "../burn-cpu", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-rocm = { path = "../burn-rocm", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-flex = { path = "../burn-flex", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-ndarray = { path = "../burn-ndarray", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-remote = { path = "../burn-remote", version = "=0.21.0-pre.3", default-features = false, optional = true }
burn-router = { path = "../burn-router", version = "=0.21.0-pre.3", default-features = false, optional = true }
burn-tch = { path = "../burn-tch", version = "=0.21.0-pre.3", default-features = false, optional = true }
burn-wgpu = { path = "../burn-wgpu", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-ir = { path = "../burn-ir", version = "=0.21.0-pre.3", optional = true, default-features = false }
burn-dispatch = { path = "../burn-dispatch", version = "=0.21.0-pre.3", optional = true, default-features = false }

cubecl = { workspace = true, default-features = false, optional = true }
