[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
categories = ["science"]
description = "Backend router decorator over the network."
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "data"]
license.workspace = true
name = "burn-remote"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-router-remote"
documentation = "https://docs.rs/burn-router-remote"
version.workspace = true

[lints]
workspace = true

[features]
default = ["client", "server"]
doc = []
tracing = [
    "burn-communication/tracing",
    "burn-ir/tracing",
    "burn-router/tracing",
    "burn-std/tracing",
    "burn-backend/tracing",
]

client = ["tokio-tungstenite", "async-channel", "tokio/sync"]
# Client-side fusion: cache recurring op-groups on the server and invoke them by id, reducing
# network traffic. When enabled, `RemoteBackend` is wrapped in `Fusion` (like the CubeCL backends).
fusion = ["client", "dep:burn-fusion", "burn-router/fusion"]
server = [
    "tokio-tungstenite",
    "async-channel",
    "tokio/sync",
    "axum",
    "tracing-core/default",
    "tracing-subscriber/default",
]


[dependencies]
burn-ir = { workspace = true, features = ["default"] }
burn-backend = { workspace = true, features = [
    "default",
    "serde", # For DTypeUsageSet to be de/serialized
] }
burn-std = { workspace = true, features = ["default"] }
burn-router = { workspace = true, features = ["default"] }
burn-fusion = { workspace = true, optional = true }
burn-communication = { workspace = true, features = [
    "data-service",
    "websocket",
] }

bytes = { workspace = true }

# Basic dependencies
log = { workspace = true }

# Shared dependencies
tokio = { workspace = true, features = ["rt-multi-thread"] }
serde = { workspace = true, features = ["derive"] }
serde_bytes = { workspace = true }
rmp-serde = { workspace = true }
futures-util = { workspace = true }

# Client dependencies
async-channel = { workspace = true, optional = true }
tokio-tungstenite = { workspace = true, optional = true }

# Server dependencies
axum = { workspace = true, features = ["ws"], optional = true }
tracing-core = { workspace = true, optional = true }
tracing-subscriber = { workspace = true, optional = true }
tokio-util = { workspace = true }

[dev-dependencies]
burn-flex = { workspace = true, features = ["default"] }
burn-tensor = { workspace = true, features = ["default", "remote"] }

[package.metadata.docs.rs]
features = ["doc"]
rustdoc-args = ["--cfg", "docsrs"]
