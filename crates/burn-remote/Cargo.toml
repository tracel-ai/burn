[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
categories = ["science"]
description = "Backend router decorator over the network."
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "data"]
license.workspace = true
name = "burn-remote"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-router-remote"
documentation = "https://docs.rs/burn-router-remote"
version.workspace = true

[lints]
workspace = true

[features]
default = ["client", "server", "iroh", "websocket"]
doc = []
tracing = [
    "burn-communication?/tracing",
    "burn-ir/tracing",
    "burn-router/tracing",
    "burn-std/tracing",
    "burn-backend/tracing",
]

client = ["tokio/sync"]
# Client-side fusion: cache recurring op-groups on the server and invoke them by id, reducing
# network traffic. When enabled, `RemoteBackend` is wrapped in `Fusion` (like the CubeCL backends).
fusion = ["client", "dep:burn-fusion", "burn-router/fusion"]
# The server core is portable. Native targets get the multi-threaded runtime, timers and signal
# handling from the `cfg(not(wasm))` dependency table below; the browser server runs its worker on
# the JS event loop and uses JS timers, so it needs none of those.
server = ["tokio/sync"]
iroh = ["dep:iroh", "tokio/io-util"]
websocket = [
    "server",
    "dep:burn-communication",
    "burn-communication/websocket",
    "burn-communication/data-service",
    "dep:tokio-util",
]


[dependencies]
burn-ir = { workspace = true, features = ["default"] }
burn-backend = { workspace = true, features = [
    "default",
    "serde", # For DTypeUsageSet to be de/serialized
] }
burn-std = { workspace = true, features = ["default"] }
burn-router = { workspace = true, features = ["default"] }
burn-fusion = { workspace = true, optional = true }
# Native transport layer (websocket client/server, tensor data service). The Iroh client does
# not use it, so it stays optional and out of the wasm build.
burn-communication = { workspace = true, optional = true }

bytes = { workspace = true }

# Basic dependencies
log = { workspace = true }
rand = { workspace = true }

# Shared dependencies. `rt`/`macros` come from the workspace default; the heavier
# `rt-multi-thread`/`time` features are pulled in only by the native transports so the Iroh
# client stays wasm-compatible (the browser drives Iroh through its own event loop).
tokio = { workspace = true, features = ["sync", "io-util"] }
serde = { workspace = true, features = ["derive"] }
serde_bytes = { workspace = true }
rmp-serde = { workspace = true }
iroh = { workspace = true, optional = true }

tokio-util = { workspace = true, optional = true }

# Native server runtime: multi-thread, timers, signals. The wasm build uses the JS event loop/timers.
[target.'cfg(not(target_family = "wasm"))'.dependencies]
tokio = { workspace = true, features = ["rt-multi-thread", "time", "signal"] }

[target.'cfg(all(target_family = "wasm", target_os = "unknown"))'.dependencies]
wasm-bindgen-futures = { workspace = true }
gloo-timers = { version = "0.3", features = ["futures"] }
futures-util = { workspace = true }

[dev-dependencies]
burn-flex = { workspace = true, features = ["default"] }
burn-tensor = { workspace = true, features = ["default", "remote-websocket"] }

[package.metadata.docs.rs]
features = ["doc"]
rustdoc-args = ["--cfg", "docsrs"]
