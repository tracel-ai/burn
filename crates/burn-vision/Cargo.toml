[package]
authors = [
    "nathanielsimard <nathaniel.simard.42@gmail.com>",
    "wingertge <wingertge@gmail.com>",
]
categories = ["science"]
description = "Vision processing operations for burn tensors"
documentation = "https://docs.rs/burn-vision"
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "gpu"]
license.workspace = true
name = "burn-vision"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-vision"
version.workspace = true

[lints]
workspace = true


[features]
default = ["burn-core/default", "flex", "cubecl-backend", "fusion", "std"]
std = ["aligned-vec/std", "burn-core/std", "burn-store?/std"]
tracing = [
    "burn-cubecl?/tracing",
    "burn-fusion?/tracing",
    "burn-ir/tracing",
    "burn-tch?/tracing",
    "burn-core/tracing",
    "cubecl/tracing",
]

cubecl-backend = ["cubecl", "burn-cubecl"]
fusion = ["burn-fusion", "burn-cuda/fusion", "burn-wgpu/fusion"]

# TODO: should remove backend crate deps and use re-exported types from burn-core
cuda = ["cubecl-backend", "burn-core/cuda", "burn-cuda"]
rocm = ["cubecl-backend", "burn-core/rocm", "burn-rocm"]
wgpu = ["cubecl-backend", "burn-core/wgpu", "burn-wgpu"]
vulkan = ["wgpu", "burn-core/vulkan", "burn-wgpu/vulkan"]
webgpu = ["wgpu", "burn-core/webgpu", "burn-wgpu/webgpu"]
metal = ["wgpu", "burn-core/metal", "burn-wgpu/metal"]
cpu = ["cubecl-backend", "burn-core/cpu", "burn-cpu"]
flex = ["burn-core/flex", "burn-flex"]
tch = ["burn-core/tch", "burn-tch"]

# TODO: move somewhere else
loss = ["std", "burn-store/pytorch", "burn-core/network", "dirs"]

[dependencies]
burn-cubecl = { workspace = true, optional = true, features = ["default"]}
burn-fusion = { workspace = true, optional = true, features = ["default"]}
burn-ir = { workspace = true, features = ["default"]}
burn-core = { workspace = true, features = [
    "extension",
] }

aligned-vec = { version = "0.6", default-features = false }
bon = { workspace = true }

# For loss functions requiring pretrained models (e.g., Gram Matrix Loss)
burn-store = { workspace = true, optional = true }
dirs = { workspace = true, optional = true }

bytemuck = { workspace = true }
cubecl = { workspace = true, optional = true }
derive-new = { workspace = true }
half = { workspace = true }
image = { version = "0.25" }
macerator = { workspace = true }
ndarray = { workspace = true }
num-traits = { workspace = true }
paste = { workspace = true }
serde = { workspace = true }

# Backends
burn-cpu = { workspace = true, optional = true }
burn-cuda = { workspace = true, optional = true }
burn-wgpu = { workspace = true, optional = true }
burn-rocm = { workspace = true, optional = true }
burn-flex = { workspace = true, optional = true, features = ["default"]}
burn-tch = { workspace = true, optional = true, features = ["default"]}
