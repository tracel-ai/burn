[package]
name = "burn-complex"
edition.workspace = true
license.workspace = true
readme.workspace = true
version.workspace = true


[features]
flex = [ "burn-flex"]
#no_std is a problem for later
#std = ["burn-tensor/std", "num-complex/std", "num-traits/std"]

    

[dependencies]
burn-backend = { workspace = true }
burn-flex = { workspace = true, optional = true, features = ["complex"] }
