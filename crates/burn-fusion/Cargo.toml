[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
categories = ["science"]
description = "Kernel fusion backend decorator for the Burn framework"
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "data"]
license.workspace = true
name = "burn-fusion"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-fusion"
documentation = "https://docs.rs/burn-fusion"
version.workspace = true

[lints]
workspace = true

[features]
default = ["std", "tracing"]
std = ["serde/std", "tracing?/std"]
doc = ["default"]
memory-checks = ["std"]
distributed = [
    "std",
    "burn-backend/distributed", 
    "burn-ir/distributed"
]

tracing = [
    "dep:tracing",
    "burn-backend/tracing",
    "burn-ir/tracing",
]

# Exposes the fusion spy API for tests that need to assert on fusion decisions.
# Not intended for production use.
test-util = ["std"]

[dependencies]
burn-backend = { workspace = true, features = ["default"] }
burn-std = { workspace = true, features = ["default"] }
burn-ir = { workspace = true, features = ["default"] }
tracing = { workspace = true, optional = true, features = ["attributes"] }
smallvec = { workspace = true }

hashbrown = { workspace = true }
derive-new = { workspace = true }
spin = { workspace = true }
log = { workspace = true }
serde = { workspace = true }

[package.metadata.docs.rs]
features = ["doc"]
rustdoc-args = ["--cfg", "docsrs"]
