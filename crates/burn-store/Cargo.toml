[package]
authors = ["Dilshod Tadjibaev (@antimora)"]
categories = ["science", "no-std", "embedded", "wasm"]
description = "The burnpack serialization format for Burn"
documentation = "https://docs.rs/burn-store"
edition.workspace = true
keywords = [
    "deep-learning",
    "machine-learning",
    "tensor",
    "storage",
    "serialization",
]
license.workspace = true
name = "burn-store"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-store"
version.workspace = true

[lints]
workspace = true

[features]
default = ["std", "burnpack", "memmap"]
memmap = ["std", "dep:memmap2"]
std = ["dep:memmap2", "burn-std/std", "byteorder/std", "ciborium?/std"]

burnpack = ["dep:serde", "dep:ciborium"]

[dependencies]
burn-std = { workspace = true }

# External dependencies
byteorder = { workspace = true, default-features = false }
bytes = { workspace = true }
ciborium = { workspace = true, optional = true }
memmap2 = { workspace = true, optional = true }
serde = { workspace = true, optional = true }

[dev-dependencies]
tempfile = { workspace = true }

# Enable extra-platforms for bytes on targets without native atomics (e.g., thumbv6m-none-eabi)
[target.'cfg(not(target_has_atomic = "ptr"))'.dependencies]
bytes = { workspace = true, features = ["extra-platforms"] }
