[package]
authors = ["Dilshod Tadjibaev (@antimora)"]
categories = ["science"]
description = "Model storage, import and cross-framework interoperability for Burn"
documentation = "https://docs.rs/burn-store"
edition.workspace = true
keywords = [
    "deep-learning",
    "machine-learning",
    "pytorch",
    "safetensors",
    "storage",
]
license.workspace = true
name = "burn-store"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-store"
version.workspace = true
# TODO(re-layering): the moved benches/ and examples/ still use the pre-split API
# and need updating; disable autodiscovery so the workspace builds in the meantime.
autobenches = false
autoexamples = false

[lints]
workspace = true

[features]
default = ["std", "pytorch", "safetensors", "burnpack", "memmap"]
memmap = ["std", "dep:memmap2"]
std = [
    "dep:memmap2",
    "dep:regex",
    "byteorder/std",
    "burn-core/std",
    "burn-pack?/std",
    "safetensors?/std",
]

burnpack = ["dep:burn-pack"]
safetensors = ["dep:safetensors"]
pytorch = ["burn-core/record-item-custom-serde", "dep:zip", "dep:serde", "dep:tar"]

# Backend passthroughs (used by tests/benches)
cuda = ["burn-core/cuda"]
metal = ["burn-core/metal"]
tch = ["burn-core/tch"]
wgpu = ["burn-core/wgpu"]

[dependencies]
burn-core = { workspace = true, default-features = false }
burn-std = { workspace = true }
burn-pack = { workspace = true, default-features = false, optional = true }

# External dependencies
byteorder = { workspace = true, default-features = false }
bytes = { workspace = true }
half = { workspace = true }
hashbrown = { workspace = true, features = ["serde"] }
memmap2 = { workspace = true, optional = true }
regex = { workspace = true, optional = true }
serde = { workspace = true, optional = true }
textdistance = { workspace = true }
zip = { workspace = true, optional = true }
tar = { workspace = true, optional = true }

# Workaround to force broken minor version to update
lzma-rust2 = { workspace = true, optional = true }

safetensors = { workspace = true, optional = true }

[dev-dependencies]
burn-core = { workspace = true, features = ["flex"] }
burn-nn = { workspace = true }
tempfile = { workspace = true }

# Enable extra-platforms for bytes on targets without native atomics (e.g., thumbv6m-none-eabi)
[target.'cfg(not(target_has_atomic = "ptr"))'.dependencies]
bytes = { workspace = true, features = ["extra-platforms"] }
