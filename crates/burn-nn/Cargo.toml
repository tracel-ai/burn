[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
categories = ["science", "no-std", "embedded", "wasm"]
description = "Neural network building blocks for the Burn deep learning framework"
documentation = "https://docs.rs/burn-nn"
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "tensor", "pytorch", "ndarray"]
license.workspace = true
name = "burn-nn"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-nn"
version.workspace = true

[lints]
workspace = true

[features]
default = [
    "std",
    "burn-core/default",
]
doc = [
    "std",
    # Doc features
    "burn-core/doc",
]
std = [
    "burn-core/std",
    "num-traits/std",
]
tracing = [
    "burn-core/tracing",
    "burn-cuda?/tracing",
    "burn-rocm?/tracing",
    "burn-tch?/tracing",
    "burn-wgpu?/tracing",
    "burn-fusion?/tracing",
]

test-cuda = [
    "burn-cuda/default",
] # To use cuda during testing, default uses flex.
test-rocm = [
    "burn-rocm/default",
] # To use hip during testing, default uses flex.
test-tch = [
    "burn-tch/default",
] # To use tch during testing, default uses flex.
test-wgpu = [
    "burn-wgpu/default",
] # To use wgpu during testing, default uses flex.
test-vulkan = [
    "test-wgpu",
    "burn-wgpu/vulkan",
] # To use wgpu-spirv during testing, default uses flex.
test-metal = [
    "test-wgpu",
    "burn-wgpu/metal",
] # To use wgpu-spirv during testing, default uses flex.

# Memory checks are disabled by default
test-memory-checks = ["burn-fusion/memory-checks"]

[dependencies]

# ** Please make sure all dependencies support no_std when std is disabled **
burn-core = { workspace = true }

num-traits = { workspace = true }

# FOR TESTING
burn-cuda = { workspace = true, optional = true }
burn-rocm = { workspace = true, optional = true }
burn-remote = { workspace = true, optional = true }
burn-router = { workspace = true, optional = true }
burn-tch = { workspace = true, optional = true, features = ["default"] }
burn-wgpu = { workspace = true, optional = true }
burn-fusion = { workspace = true, optional = true, features = ["default"] }

[dev-dependencies]
burn-flex = { workspace = true, features = ["default"] }
burn-autodiff = { workspace = true, features = ["default"] }
rstest = { workspace = true }

[package.metadata.docs.rs]
features = ["doc"]
rustdoc-args = ["--cfg", "docsrs"]
