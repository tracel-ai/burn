[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
categories = ["science", "no-std", "embedded", "wasm"]
description = "Neural network building blocks for the Burn deep learning framework"
documentation = "https://docs.rs/burn-nn"
edition.workspace = true
keywords = ["deep-learning", "machine-learning", "tensor", "pytorch", "ndarray"]
license.workspace = true
name = "burn-nn"
readme.workspace = true
repository = "https://github.com/tracel-ai/burn/tree/main/crates/burn-nn"
version.workspace = true

[lints]
workspace = true

[features]
default = ["std", "burn-core/default"]
doc = [
    "std",
    # Doc features
    "burn-core/doc",
    "pretrained",
]
std = ["burn-core/std", "num-traits/std", "burn-store?/std", "burn-std?/std"]

tracing = ["burn-core/tracing"]
pretrained = ["std", "burn-store/pytorch", "burn-std/network", "dirs"]

# Backends
cuda = ["burn-core/cuda"]
rocm = ["burn-core/rocm"]
ndarray = ["burn-core/ndarray"]
tch = ["burn-core/tch"]
vulkan = ["burn-core/vulkan"]
webgpu = ["burn-core/webgpu"]
wgpu = ["burn-core/wgpu"]
metal = ["burn-core/metal"]
cpu = ["burn-core/cpu"]
autodiff = ["burn-core/autodiff"]

# Backend features
autotune = ["burn-core/autotune"]
autotune-checks = ["burn-core/autotune-checks"]
fusion = ["burn-core/fusion"]

# Memory checks are disabled by default
test-memory-checks = ["burn-core/test-memory-checks"]

[dependencies]

# ** Please make sure all dependencies support no_std when std is disabled **
burn-core = { path = "../burn-core", version = "=0.21.0-pre.2", default-features = false }

num-traits = { workspace = true }

# For loss functions requiring pretrained models (e.g., Gram Matrix Loss)
burn-store = { path = "../burn-store", version = "=0.21.0-pre.2", optional = true, default-features = false }
burn-std = { path = "../burn-std", version = "=0.21.0-pre.2", optional = true, default-features = false }
dirs = { workspace = true, optional = true }

[dev-dependencies]
burn-ndarray = { path = "../burn-ndarray", version = "=0.21.0-pre.2" }
burn-autodiff = { path = "../burn-autodiff", version = "=0.21.0-pre.2" }
burn-core = { path = "../burn-core", version = "=0.21.0-pre.2", default-features = false, features = [
    "autodiff",
] }
rstest = { workspace = true }

[package.metadata.docs.rs]
features = ["doc"]
rustdoc-args = ["--cfg", "docsrs"]
