[package]
name = "dqn-agent"
edition.workspace = true
version = "0.22.0-pre.1"

[features]
default = ["burn/default", "burn/tui"]
tch-cpu = ["burn/tch"]
tch-gpu = ["burn/tch"]
wgpu = ["burn/wgpu"]
metal = ["burn/metal"]
cuda = ["burn/cuda"]
vulkan = ["burn/vulkan"]
rocm = ["burn/rocm"]

[dependencies]
# Disable autotune default for now.
burn = { workspace = true, features = [
    "train",
    "metrics",
    "std",
    "rl",
    "fusion",
    "flex",
] }
# Just for this example.
gym-rs = { version = "0.3.1", branch = "main", git = "https://github.com/MathisWellmann/gym-rs" }
rand.workspace = true
derive-new = { workspace = true }

[lints]
workspace = true
