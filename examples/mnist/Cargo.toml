[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
edition.workspace = true
license.workspace = true
name = "mnist"
publish = false
version.workspace = true

[lints]
workspace = true

[features]
default = ["burn/default", "burn/tui"]
flex = ["burn/flex"]
tch-cpu = ["burn/tch"]
tch-gpu = ["burn/tch"]
wgpu = ["burn/wgpu"]
metal = ["burn/metal"]
cuda = ["burn/cuda"]
vulkan = ["burn/vulkan"]
rocm = ["burn/rocm"]

[dependencies]
burn = { workspace = true, features = [
    "train",
    "vision",
    "metrics",
    "fusion",
    "dispatch",
    "flex",
] }

# Serialization
log = { workspace = true }
rand.workspace = true
serde = { workspace = true, features = ["std", "derive"] }
