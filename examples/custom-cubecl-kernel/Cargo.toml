[package]
authors = ["nathanielsimard <nathaniel.simard.42@gmail.com>"]
edition.workspace = true
license.workspace = true
name = "custom-cubecl-kernel"
publish = false
version.workspace = true

[lints]
workspace = true

[dependencies]
burn = { path = "../../crates/burn", default-features = false, features = [
    "autodiff",
    "wgpu",
    "autotune",
    "template",
    "extension"
] }
burn-cubecl = { path = "../../crates/burn-cubecl" }
cubecl = { workspace = true, features = ["wgpu"] }

# TODO: burn/backend-extension or burn/extension feature flag (via burn-tensor/extension)
# which re-exports the burn-backend types

# Serialization
log = { workspace = true }
serde = { workspace = true, features = ["std", "derive"] }


burn-backend-extension = { path = "../../crates/burn-backend-extension" }