[package]
edition.workspace = true
name = "modern-lstm"
version = "0.21.0-pre.5"

[lints]
workspace = true

[features]
cuda = ["burn/cuda"]
flex = ["burn/flex"]
tch-cpu = ["burn/tch"]
tch-gpu = ["burn/tch"]
wgpu = ["burn/wgpu"]

[dependencies]
burn = { workspace = true, features = ["default", "train"] }

# Random number generator
rand = { workspace = true, features = ["thread_rng"] }
rand_distr = { workspace = true }

# Serialization
serde = { workspace = true, features = ["std", "derive"] }

# Organise the results in dataframe
planus = { workspace = true }
polars = { workspace = true }
